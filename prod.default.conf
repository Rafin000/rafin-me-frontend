server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy API calls to the backend container.
    # In docker-compose the backend service is named "backend" on port 6000.
    location /api/ {
        proxy_pass         http://backend:6000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
        # API responses must never be cached by Cloudflare or browsers
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # SPA entry: never cache index.html. Always fetch fresh so new
    # deploys reach users immediately.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
